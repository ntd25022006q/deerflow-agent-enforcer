name: DeerFlow Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # === Dependency Vulnerability Scan ===
      - name: npm Audit (High/Critical)
        if: hashFiles('package-lock.json') != ''
        run: |
          npm audit --audit-level=high --json > audit-report.json 2>/dev/null || true
          VULN_COUNT=$(python3 -c "
          import json
          try:
              d = json.load(open('audit-report.json'))
              print(len(d.get('vulnerabilities', {})))
          except: print(0)
          " 2>/dev/null || echo "0")
          echo "Vulnerabilities found: $VULN_COUNT"
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "::error::$VULN_COUNT high/critical vulnerabilities detected"
            npm audit 2>/dev/null | head -30
            exit 1
          fi

      # === Secret Detection (Comprehensive) ===
      - name: Deep Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # === OWASP Dependency Check ===
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'deerflow-project'
          path: '.'
          format: 'HTML'
        continue-on-error: true

      # === Python Safety Check ===
      - name: Python Safety Check
        if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
        run: |
          pip install safety 2>/dev/null || true
          if command -v safety &> /dev/null; then
            safety check --json 2>/dev/null || true
          fi
        continue-on-error: true

      # === Report ===
      - name: Security Report
        if: always()
        run: |
          echo "════════════════════════════════════════════"
          echo "  DEERFLOW SECURITY AUDIT COMPLETE"
          echo "  All security gates evaluated."
          echo "════════════════════════════════════════════"
